<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nico Egerer — Zertifikate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0d;
    --bg2: #171614;
    --bg3: #1e1c1a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text2: #8a8580;
    --text3: #5c5955;
    --accent: #c9a96e;
    --accent2: #a07840;
    --cat-school: #5b8f6e;
    --cat-english: #4a7ca8;
    --cat-realschule: #8f5b5b;
    --tag-bg: rgba(201,169,110,0.1);
    --tag-text: #c9a96e;
    --sidebar-w: 240px;
  }

  body {
    font-family: 'Epilogue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    height: 56px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .logo span {
    color: var(--text2);
    font-style: italic;
  }

  .divider-v {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .search-wrap {
    flex: 1;
    max-width: 400px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
  }

  .search-wrap input {
    width: 100%;
    height: 34px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px 0 36px;
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--border-hover); }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .view-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .view-btn:hover, .view-btn.active {
    background: var(--bg3);
    color: var(--accent);
    border-color: var(--border-hover);
  }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sidebar-section {
    padding: 0 16px;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 13.5px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    border: 1px solid transparent;
  }

  .nav-item:hover {
    background: var(--bg3);
    color: var(--text);
  }

  .nav-item.active {
    background: rgba(201,169,110,0.1);
    color: var(--accent);
    border-color: rgba(201,169,110,0.15);
  }

  .nav-item .count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-stats {
    padding: 16px;
    margin: 0 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 4px 0;
  }

  .stat-row .label { color: var(--text3); }
  .stat-row .val {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 11px;
  }

  /* MAIN */
  .main {
    flex: 1;
    overflow: auto;
    padding: 28px 32px;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .breadcrumb .crumb {
    cursor: pointer;
    transition: color 0.15s;
  }

  .breadcrumb .crumb:hover { color: var(--accent); }
  .breadcrumb .crumb.active { color: var(--text2); }

  .breadcrumb .sep { opacity: 0.4; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .section-meta {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* CATEGORY BLOCKS */
  .category-block {
    margin-bottom: 36px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .cat-name {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--text);
  }

  .cat-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: auto;
  }

  /* GRID VIEW */
  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .file-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .file-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .file-card:hover {
    border-color: var(--border-hover);
    background: var(--bg3);
    transform: translateY(-1px);
  }

  .file-card:hover::before { opacity: 1; }

  .file-card.cat-school::before { background: var(--cat-school); }
  .file-card.cat-english::before { background: var(--cat-english); }
  .file-card.cat-realschule::before { background: var(--cat-realschule); }

  .file-icon {
    width: 36px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .file-name {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.4;
    font-weight: 400;
  }

  .file-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: auto;
  }

  .file-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.06em;
  }

  /* LIST VIEW */
  .files-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .file-row:hover {
    background: var(--bg3);
    border-color: var(--border);
  }

  .file-row .row-icon { flex-shrink: 0; }
  .file-row .row-name { flex: 1; font-size: 13.5px; color: var(--text); }
  .file-row .row-cat { font-size: 11px; color: var(--text3); min-width: 100px; }
  .file-row .row-ext {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Epilogue', sans-serif;
    transition: all 0.15s;
  }

  .filter-chip:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .filter-chip.active {
    background: rgba(201,169,110,0.12);
    border-color: rgba(201,169,110,0.3);
    color: var(--accent);
  }

  .filter-chip .chip-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-state p { font-size: 14px; margin-top: 12px; }

  /* DETAIL PANEL */
  .detail-panel {
    width: 280px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    gap: 20px;
  }

  .detail-panel.open { display: flex; }

  .detail-close {
    align-self: flex-end;
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .detail-close:hover { color: var(--text); border-color: var(--border-hover); }

  .detail-file-icon {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: var(--bg3);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .detail-name {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    line-height: 1.35;
  }

  .detail-rows {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .detail-row:last-child { border-bottom: none; }
  .detail-row .dk { color: var(--text3); }
  .detail-row .dv { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; }

  .open-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    background: rgba(201,169,110,0.12);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: auto;
  }

  .open-btn:hover {
    background: rgba(201,169,110,0.2);
  }

  /* STATUS BAR */
  .statusbar {
    height: 28px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cat-school);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* HIDDEN */
  .hidden { display: none !important; }

  @media (max-width: 720px) {
    .sidebar { display: none; }
    .detail-panel { display: none !important; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">Nico Egerer <span>/ Zertifikate</span></div>
  <div class="divider-v"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.2"/>
      <line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Dokument suchen…" autocomplete="off">
  </div>
  <div class="topbar-right">
    <button class="view-btn active" id="btnGrid" title="Rasteransicht" onclick="setView('grid')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <rect x="0" y="0" width="6" height="6" rx="1.5"/><rect x="8" y="0" width="6" height="6" rx="1.5"/>
        <rect x="0" y="8" width="6" height="6" rx="1.5"/><rect x="8" y="8" width="6" height="6" rx="1.5"/>
      </svg>
    </button>
    <button class="view-btn" id="btnList" title="Listenansicht" onclick="setView('list')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="6" width="14" height="2" rx="1"/>
        <rect x="0" y="11" width="14" height="2" rx="1"/>
      </svg>
    </button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Ansicht</div>
      <div class="nav-item active" data-filter="all" onclick="setFilter('all', this)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" style="opacity:0.6">
          <path d="M1 2h12v2H1zM1 6h12v2H1zM1 10h12v2H1z"/>
        </svg>
        Alle Dokumente
        <span class="count">11</span>
      </div>
      <div class="nav-item" data-filter="recent" onclick="setFilter('recent', this)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" style="opacity:0.6">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        </svg>
        Zuletzt hinzugefügt
        <span class="count">3</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Kategorien</div>
      <div class="nav-item" data-filter="Berufsschule" onclick="setFilter('Berufsschule', this)">
        <span class="nav-dot" style="background:var(--cat-school)"></span>
        Berufsschule
        <span class="count">1</span>
      </div>
      <div class="nav-item" data-filter="Englisch" onclick="setFilter('Englisch', this)">
        <span class="nav-dot" style="background:var(--cat-english)"></span>
        Englisch
        <span class="count">4</span>
      </div>
      <div class="nav-item" data-filter="Realschule" onclick="setFilter('Realschule', this)">
        <span class="nav-dot" style="background:var(--cat-realschule)"></span>
        Realschule
        <span class="count">6</span>
      </div>
    </div>

    <div class="sidebar-section" style="margin-top: auto;">
      <div class="sidebar-stats">
        <div class="sidebar-label" style="padding:0;margin-bottom:10px;">Übersicht</div>
        <div class="stat-row">
          <span class="label">Dokumente</span>
          <span class="val">11</span>
        </div>
        <div class="stat-row">
          <span class="label">Kategorien</span>
          <span class="val">3</span>
        </div>
        <div class="stat-row">
          <span class="label">Format</span>
          <span class="val">PDF</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainArea">
    <!-- breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
      <span class="crumb" onclick="setFilter('all', document.querySelector('[data-filter=all]'))">nicoegerer.de</span>
      <span class="sep">›</span>
      <span class="crumb">certificates</span>
      <span class="sep">›</span>
      <span class="crumb active" id="bcActive">Alle</span>
    </div>

    <!-- section header -->
    <div class="section-header">
      <h1 class="section-title" id="pageTitle">Alle Dokumente</h1>
      <span class="section-meta" id="pageMeta">11 Dateien</span>
    </div>

    <!-- filter chips -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" data-chip="all" onclick="setFilter('all', document.querySelector('[data-filter=all]')); setChip('all')">Alle</button>
      <button class="filter-chip" data-chip="Berufsschule" onclick="setFilter('Berufsschule', null); setChip('Berufsschule')">
        <span class="chip-dot" style="background:var(--cat-school)"></span> Berufsschule
      </button>
      <button class="filter-chip" data-chip="Englisch" onclick="setFilter('Englisch', null); setChip('Englisch')">
        <span class="chip-dot" style="background:var(--cat-english)"></span> Englisch
      </button>
      <button class="filter-chip" data-chip="Realschule" onclick="setFilter('Realschule', null); setChip('Realschule')">
        <span class="chip-dot" style="background:var(--cat-realschule)"></span> Realschule
      </button>
    </div>

    <!-- file display area -->
    <div id="fileArea"></div>
  </main>

  <!-- DETAIL PANEL -->
  <aside class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-file-icon">
      <svg width="48" height="60" viewBox="0 0 48 60" fill="none">
        <rect x="0.5" y="0.5" width="36" height="47" rx="3.5" fill="#1e1c1a" stroke="#3a3835"/>
        <path d="M36.5 12.5 L36.5 0.5 L47.5 12.5 Z" fill="#2a2825" stroke="#3a3835" stroke-linejoin="round"/>
        <rect x="6" y="20" width="24" height="2" rx="1" fill="#c9a96e" opacity="0.4"/>
        <rect x="6" y="25" width="18" height="2" rx="1" fill="#c9a96e" opacity="0.25"/>
        <rect x="6" y="30" width="21" height="2" rx="1" fill="#c9a96e" opacity="0.2"/>
        <rect x="6" y="35" width="15" height="2" rx="1" fill="#c9a96e" opacity="0.15"/>
        <rect x="0" y="44" width="48" height="16" rx="3" fill="#c9a96e"/>
        <text x="24" y="55.5" text-anchor="middle" font-family="DM Mono" font-size="8" font-weight="500" fill="#0f0e0d">PDF</text>
      </svg>
    </div>
    <div class="detail-name" id="detailName">—</div>
    <div class="detail-rows" id="detailRows"></div>
    <button class="open-btn" id="detailOpenBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M1 13 L13 1 M13 1 H7 M13 1 V7"/>
      </svg>
      Datei öffnen
    </button>
  </aside>
</div>

<!-- STATUS BAR -->
<footer class="statusbar">
  <span class="status-dot"></span>
  <span id="statusText">11 Dokumente · PDF</span>
  <span style="margin-left:auto; opacity:0.5">Nico Egerer</span>
</footer>

<script>
const FILES = [
  {
    name: "Jahreszeugnis IT",
    file: "it10a_Jahreszeugnis.pdf",
    category: "Berufsschule",
    path: "Berufsschule/it10a_Jahreszeugnis.pdf",
    type: "Zeugnis",
    year: "2024",
    recent: true
  },
  {
    name: "B2+ Englisch Zertifikat",
    file: "B2+EnglishLanguageCertificate.pdf",
    category: "Englisch",
    path: "Englisch/B2+EnglishLanguageCertificate.pdf",
    type: "Sprachzertifikat",
    year: "2023"
  },
  {
    name: "C1 Englisch Zertifikat",
    file: "C1EnglishLanguageCertificate.pdf",
    category: "Englisch",
    path: "Englisch/C1EnglishLanguageCertificate.pdf",
    type: "Sprachzertifikat",
    year: "2024",
    recent: true
  },
  {
    name: "Business English: Speaking World",

const CAT_COLORS = {
  Berufsschule: 'cat-school',
  Englisch: 'cat-english',
  Realschule: 'cat-realschule'
};

const CAT_CSS = {
  Berufsschule: 'var(--cat-school)',
  Englisch: 'var(--cat-english)',
  Realschule: 'var(--cat-realschule)'
};

let currentFilter = 'all';
let currentView = 'grid';
let currentSearch = '';

function pdfIcon(color) {
  return `<svg width="32" height="40" viewBox="0 0 32 40" fill="none">
    <rect x="0.5" y="0.5" width="24" height="31" rx="2.5" fill="#1e1c1a" stroke="#3a3835"/>
    <path d="M24.5 8.5 L24.5 0.5 L31.5 8.5 Z" fill="#2a2825" stroke="#3a3835" stroke-linejoin="round"/>
    <rect x="4" y="13" width="16" height="1.5" rx="0.75" fill="${color}" opacity="0.5"/>
    <rect x="4" y="17" width="12" height="1.5" rx="0.75" fill="${color}" opacity="0.3"/>
    <rect x="4" y="21" width="14" height="1.5" rx="0.75" fill="${color}" opacity="0.2"/>
    <rect x="0" y="29" width="32" height="11" rx="2" fill="${color}"/>
    <text x="16" y="37" text-anchor="middle" font-family="DM Mono, monospace" font-size="6" font-weight="500" fill="#0f0e0d">PDF</text>
  </svg>`;
}

function getFiltered() {
  let list = [...FILES];
  if (currentFilter === 'recent') list = list.filter(f => f.recent);
  else if (currentFilter !== 'all') list = list.filter(f => f.category === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(f => f.name.toLowerCase().includes(q) || f.category.toLowerCase().includes(q) || f.type.toLowerCase().includes(q));
  }
  return list;
}

function renderGrid(files) {
  if (currentFilter === 'all' || currentFilter === 'recent') {
    const cats = [...new Set(files.map(f => f.category))];
    if (currentFilter === 'recent') {
      return `<div class="files-grid">${files.map(f => cardHTML(f)).join('')}</div>`;
    }
    return cats.map(cat => {
      const catFiles = files.filter(f => f.category === cat);
      return `<div class="category-block">
        <div class="cat-header">
          <span class="cat-dot" style="background:${CAT_CSS[cat]}"></span>
          <span class="cat-name">${cat}</span>
          <span class="cat-count">${catFiles.length}</span>
        </div>
        <div class="files-grid">${catFiles.map(f => cardHTML(f)).join('')}</div>
      </div>`;
    }).join('');
  }
  return `<div class="files-grid">${files.map(f => cardHTML(f)).join('')}</div>`;
}

function cardHTML(f) {
  const cls = CAT_COLORS[f.category];
  const col = CAT_CSS[f.category];
  return `<div class="file-card ${cls}" onclick="openDetail(${FILES.indexOf(f)})">
    <div class="file-icon">${pdfIcon(col)}</div>
    <div class="file-name">${f.name}</div>
    <div class="file-meta">
      <span class="file-tag">${f.type}</span>
      <span style="margin-left:auto">${f.year}</span>
    </div>
  </div>`;
}

function renderList(files) {
  const header = `<div class="file-row" style="cursor:default;opacity:0.5;pointer-events:none">
    <div class="row-icon" style="width:22px"></div>
    <div class="row-name" style="font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.06em">NAME</div>
    <div class="row-cat" style="font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.06em">KATEGORIE</div>
    <div class="row-ext" style="background:transparent;border-color:transparent">TYP</div>
  </div>`;
  const rows = files.map(f => {
    const col = CAT_CSS[f.category];
    return `<div class="file-row" onclick="openDetail(${FILES.indexOf(f)})">
      <div class="row-icon">${pdfIcon(col).replace('width="32"','width="22"').replace('height="40"','height="28"').replace('viewBox="0 0 32 40"','viewBox="0 0 32 40"')}</div>
      <div class="row-name">${f.name}</div>
      <div class="row-cat">
        <span style="display:inline-flex;align-items:center;gap:5px">
          <span style="width:6px;height:6px;border-radius:50%;background:${col};display:inline-block"></span>
          ${f.category}
        </span>
      </div>
      <div class="row-ext">${f.type}</div>
    </div>`;
  }).join('');
  return `<div class="files-list">${header}${rows}</div>`;
}

function render() {
  const files = getFiltered();
  const area = document.getElementById('fileArea');
  const meta = document.getElementById('pageMeta');
  const status = document.getElementById('statusText');

  if (!files.length) {
    area.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.3">
        <circle cx="20" cy="20" r="18" stroke="white" stroke-width="1.5"/>
        <path d="M14 14 L26 26 M26 14 L14 26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p>Keine Dokumente gefunden</p>
    </div>`;
  } else {
    area.innerHTML = currentView === 'grid' ? renderGrid(files) : renderList(files);
  }

  meta.textContent = `${files.length} Datei${files.length === 1 ? '' : 'en'}`;
  status.textContent = `${files.length} Dokument${files.length === 1 ? '' : 'e'} · PDF`;
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function setFilter(f, navEl) {
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (navEl) navEl.classList.add('active');

  const labels = { all: 'Alle', recent: 'Zuletzt hinzugefügt', Berufsschule: 'Berufsschule', Englisch: 'Englisch', Realschule: 'Realschule' };
  document.getElementById('pageTitle').textContent = labels[f] || f;
  document.getElementById('bcActive').textContent = labels[f] || f;

  const chips = document.querySelectorAll('.filter-chip');
  chips.forEach(c => c.classList.toggle('active', c.dataset.chip === f));

  closeDetail();
  render();
}

function setChip(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.chip === f));
  document.querySelectorAll('.nav-item').forEach(c => c.classList.toggle('active', c.dataset.filter === f));

  const labels = { all: 'Alle', recent: 'Zuletzt hinzugefügt', Berufsschule: 'Berufsschule', Englisch: 'Englisch', Realschule: 'Realschule' };
  document.getElementById('pageTitle').textContent = labels[f] || f;
  document.getElementById('bcActive').textContent = labels[f] || f;

  render();
}

function openDetail(idx) {
  const f = FILES[idx];
  document.getElementById('detailName').textContent = f.name;
  document.getElementById('detailRows').innerHTML = `
    <div class="detail-row"><span class="dk">Dateiname</span><span class="dv">${f.file}</span></div>
    <div class="detail-row"><span class="dk">Kategorie</span><span class="dv">${f.category}</span></div>
    <div class="detail-row"><span class="dk">Typ</span><span class="dv">${f.type}</span></div>
    <div class="detail-row"><span class="dk">Jahr</span><span class="dv">${f.year}</span></div>
    <div class="detail-row"><span class="dk">Format</span><span class="dv">PDF</span></div>
    <div class="detail-row"><span class="dk">Pfad</span><span class="dv" style="font-size:10px;word-break:break-all">${f.path}</span></div>
  `;
  document.getElementById('detailOpenBtn').onclick = () => {
    window.open(f.path, '_blank');
  };
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
