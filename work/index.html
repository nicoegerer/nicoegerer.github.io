<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite in Bearbeitung</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 30px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.6;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>🚧 Seite in Bearbeitung</h1>
    <p>
      Diese Website wird aktuell mit viel Sorgfalt und Liebe zum Detail neu gestaltet.
      Bald erwartet dich hier ein modernes und einzigartiges Erlebnis.
    </p>
    <p>
      Schau gerne in Kürze wieder vorbei – es lohnt sich!
    </p>

    <a href="https://nicoegerer.de" class="btn">Zur Hauptseite zurückkehren</a>

    <div class="footer">
      © 2026 Nico Egerer
    </div>
  </div>
</body>
</html>
